<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GestionStock</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0f14;
      --surface: #16181f;
      --card: #1c1e27;
      --border: #2a2d3a;
      --accent: #4f8ef7;
      --accent2: #7c5cfc;
      --green: #2ecc71;
      --red: #e74c3c;
      --orange: #f39c12;
      --text: #e8eaf2;
      --muted: #6b7080;
      --mono: 'DM Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(14,15,20,0.95);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── LAYOUT ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    /* ── STATS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem 1.6rem;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
      font-family: var(--mono);
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: var(--text);
    }

    /* ── SECTION TITLE ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
    }

    .section-title {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    /* ── FORM ── */
    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.8rem;
      margin-bottom: 2.5rem;
    }

    .form-card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    label {
      font-size: 0.78rem;
      color: var(--muted);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 0.9rem;
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.4rem;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
    }

    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }

    .btn-danger {
      background: rgba(231,76,60,0.12);
      color: var(--red);
      border: 1px solid rgba(231,76,60,0.3);
    }

    .btn-danger:hover { background: rgba(231,76,60,0.22); }

    .btn-edit {
      background: rgba(79,142,247,0.12);
      color: var(--accent);
      border: 1px solid rgba(79,142,247,0.3);
    }

    .btn-edit:hover { background: rgba(79,142,247,0.22); }

    .form-actions {
      margin-top: 1.2rem;
      display: flex;
      gap: 0.8rem;
    }

    /* ── TABLE ── */
    .table-wrapper {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 0.9rem 1.2rem;
      text-align: left;
      font-size: 0.72rem;
      color: var(--muted);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
    }

    td {
      padding: 1rem 1.2rem;
      font-size: 0.88rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-family: var(--mono);
      background: rgba(79,142,247,0.12);
      color: var(--accent);
      border: 1px solid rgba(79,142,247,0.25);
    }

    .tx-hash {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tx-hash a { color: var(--accent2); text-decoration: none; }
    .tx-hash a:hover { text-decoration: underline; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 0.9rem 1.4rem;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 999;
      pointer-events: none;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    #toast.success {
      background: rgba(46,204,113,0.15);
      border: 1px solid rgba(46,204,113,0.4);
      color: var(--green);
    }

    #toast.error {
      background: rgba(231,76,60,0.15);
      border: 1px solid rgba(231,76,60,0.4);
      color: var(--red);
    }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .empty span { display: block; font-size: 2.5rem; margin-bottom: 0.8rem; }

    /* ── LOADING ── */
    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .actions { display: flex; gap: 0.5rem; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📦</div>
    GestionStock
  </div>
  <div class="status-pill">
    <div class="status-dot"></div>
    API connectée
  </div>
</header>

<main>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Total produits</div>
      <div class="stat-value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Transactions blockchain</div>
      <div class="stat-value" id="stat-tx">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Réseau blockchain</div>
      <div class="stat-value" style="font-size:1.1rem; padding-top:0.5rem;">Ethereum Sepolia</div>
    </div>
  </div>

  <!-- Formulaire -->
  <div class="form-card">
    <h2 id="form-title">➕ Ajouter un produit</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Nom du produit</label>
        <input id="f-nom" type="text" placeholder="Ex: Casque de chantier" />
      </div>
      <div class="form-group">
        <label>Catégorie</label>
        <input id="f-categorie" type="text" placeholder="Ex: Protection" />
      </div>
      <div class="form-group">
        <label>Quantité</label>
        <input id="f-quantite" type="number" placeholder="0" min="0" />
      </div>
      <div class="form-group">
        <label>Prix (€)</label>
        <input id="f-prix" type="number" placeholder="0.00" min="0" step="0.01" />
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" id="btn-submit" onclick="submitForm()">
        <span>Ajouter</span>
      </button>
      <button class="btn btn-edit" id="btn-cancel" onclick="cancelEdit()" style="display:none">
        Annuler
      </button>
    </div>
  </div>

  <!-- Liste produits -->
  <div class="section-header">
    <div class="section-title">Inventaire</div>
    <button class="btn btn-edit" onclick="loadProduits()" style="font-size:0.8rem; padding:0.4rem 0.9rem">
      ↻ Actualiser
    </button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Nom</th>
          <th>Catégorie</th>
          <th>Quantité</th>
          <th>Prix</th>
          <th>Blockchain TX</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="6" class="empty"><span>⏳</span>Chargement...</td></tr>
      </tbody>
    </table>
  </div>

</main>

<div id="toast"></div>

<script>
  const API = '';  // même origine
  let editingId = null;
  let txCount = 0;

  async function loadProduits() {
    try {
      const res = await fetch(`${API}/produits`);
      const data = await res.json();
      const tbody = document.getElementById('table-body');
      const produits = data.produits || [];

      document.getElementById('stat-total').textContent = produits.length;
      txCount = produits.filter(p => p.blockchain_tx).length;
      document.getElementById('stat-tx').textContent = txCount;

      if (produits.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty"><span>📭</span>Aucun produit. Ajoutez-en un !</td></tr>`;
        return;
      }

      tbody.innerHTML = produits.map(p => `
        <tr>
          <td><strong>${p.nom}</strong></td>
          <td><span class="badge">${p.categorie}</span></td>
          <td>${p.quantite}</td>
          <td>${p.prix.toFixed(2)} €</td>
          <td class="tx-hash">
            ${p.blockchain_tx
              ? `<a href="https://sepolia.etherscan.io/tx/0x${p.blockchain_tx}" target="_blank" title="${p.blockchain_tx}">0x${p.blockchain_tx.substring(0,10)}…</a>`
              : '<span style="color:#6b7080">—</span>'}
          </td>
          <td>
            <div class="actions">
              <button class="btn btn-edit" style="font-size:0.78rem;padding:0.3rem 0.7rem" onclick="editProduit('${p.id}', '${p.nom}', '${p.categorie}', ${p.quantite}, ${p.prix})">✏️</button>
              <button class="btn btn-danger" style="font-size:0.78rem;padding:0.3rem 0.7rem" onclick="deleteProduit('${p.id}')">🗑️</button>
            </div>
          </td>
        </tr>
      `).join('');
    } catch (e) {
      showToast('Erreur de connexion à l\'API', 'error');
    }
  }

  async function submitForm() {
    const nom = document.getElementById('f-nom').value.trim();
    const categorie = document.getElementById('f-categorie').value.trim();
    const quantite = parseInt(document.getElementById('f-quantite').value);
    const prix = parseFloat(document.getElementById('f-prix').value);

    if (!nom || !categorie || isNaN(quantite) || isNaN(prix)) {
      showToast('Veuillez remplir tous les champs', 'error');
      return;
    }

    const btn = document.getElementById('btn-submit');
    btn.innerHTML = '<span class="loading"></span>';
    btn.disabled = true;

    try {
      if (editingId) {
        await fetch(`${API}/produits/${editingId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nom, categorie, quantite, prix })
        });
        showToast('Produit modifié ✓', 'success');
        cancelEdit();
      } else {
        const res = await fetch(`${API}/produits`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nom, categorie, quantite, prix })
        });
        const data = await res.json();
        showToast('Produit ajouté + ancré sur blockchain ✓', 'success');
        clearForm();
      }
      await loadProduits();
    } catch (e) {
      showToast('Erreur lors de l\'opération', 'error');
    } finally {
      btn.innerHTML = editingId ? '<span>Modifier</span>' : '<span>Ajouter</span>';
      btn.disabled = false;
    }
  }

  function editProduit(id, nom, categorie, quantite, prix) {
    editingId = id;
    document.getElementById('f-nom').value = nom;
    document.getElementById('f-categorie').value = categorie;
    document.getElementById('f-quantite').value = quantite;
    document.getElementById('f-prix').value = prix;
    document.getElementById('form-title').textContent = '✏️ Modifier le produit';
    document.getElementById('btn-submit').innerHTML = '<span>Modifier</span>';
    document.getElementById('btn-cancel').style.display = 'inline-flex';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelEdit() {
    editingId = null;
    clearForm();
    document.getElementById('form-title').textContent = '➕ Ajouter un produit';
    document.getElementById('btn-submit').innerHTML = '<span>Ajouter</span>';
    document.getElementById('btn-cancel').style.display = 'none';
  }

  function clearForm() {
    ['f-nom','f-categorie','f-quantite','f-prix'].forEach(id => {
      document.getElementById(id).value = '';
    });
  }

  async function deleteProduit(id) {
    if (!confirm('Supprimer ce produit ?')) return;
    try {
      await fetch(`${API}/produits/${id}`, { method: 'DELETE' });
      showToast('Produit supprimé ✓', 'success');
      await loadProduits();
    } catch (e) {
      showToast('Erreur lors de la suppression', 'error');
    }
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => t.className = '', 3000);
  }

  loadProduits();
</script>
</body>
</html>
